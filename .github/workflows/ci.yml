name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate fixtures
        run: node tools/validate-fixtures.mjs
      - name: Fixtures are regenerable and committed in sync
        run: |
          node tools/generate-fixtures.mjs
          git diff --exit-code -- fixtures || { echo "::error::fixtures out of sync with generator — run node tools/generate-fixtures.mjs and commit"; exit 1; }
