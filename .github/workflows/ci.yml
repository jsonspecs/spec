name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Validate fixtures
        run: node tools/validate-fixtures.mjs
      - name: Fixtures exactly match the generator (full tree diff, sees untracked/stale files)
        run: |
          rm -rf /tmp/fixgen && mkdir -p /tmp/fixgen/fixtures
          cp -r tools /tmp/fixgen/
          node /tmp/fixgen/tools/generate-fixtures.mjs
          diff -ru --exclude=README.md /tmp/fixgen/fixtures fixtures
