name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: '17'
      - name: Tag commit must belong to main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || { echo "::error::tag is not on main"; exit 1; }
      - name: Tag, specification, and suite versions must match
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          SPEC_VERSION="$(node tools/spec-version.mjs)"
          test "$TAG_VERSION" = "$SPEC_VERSION" || { echo "::error::tag $TAG_VERSION does not match SPEC $SPEC_VERSION"; exit 1; }
          grep -Fq "## [$SPEC_VERSION]" CHANGELOG.md || { echo "::error::CHANGELOG has no entry [$SPEC_VERSION]"; exit 1; }
      - name: Validate fixtures
        run: node tools/validate-fixtures.mjs
      - name: Validate full Russian SPEC translation parity
        run: node tools/validate-doc-parity.mjs
      - name: Cross-check JCS UTF-16 ordering on Java
        run: java tools/JcsUtf16Check.java
      - name: Fixtures exactly match the generator
        run: |
          FIXGEN="$(mktemp -d)"
          mkdir -p "$FIXGEN/fixtures"
          cp -r tools "$FIXGEN/"
          cp SPEC.md "$FIXGEN/"
          node "$FIXGEN/tools/generate-fixtures.mjs"
          diff -ru --exclude=README.md "$FIXGEN/fixtures" fixtures
      - name: Build release archive
        run: git archive --format=tar.gz --prefix="jsonspecs-spec-${GITHUB_REF_NAME}/" -o "jsonspecs-spec-${GITHUB_REF_NAME}.tar.gz" "${GITHUB_REF_NAME}"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: jsonspecs-spec-*.tar.gz
