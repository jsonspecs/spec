name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate fixtures
        run: node tools/validate-fixtures.mjs
      - name: Build release archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="jsonspecs-spec-${TAG}/" -o "jsonspecs-spec-${TAG}.tar.gz" "${GITHUB_REF_NAME}"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: jsonspecs-spec-*.tar.gz
